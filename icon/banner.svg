<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="#0a0a0a"/>
  <!-- Dot grid texture -->
  <rect width="1280" height="320" fill="url(#dots)"/>

  <!-- Subtle orange edge glow on left -->
  <rect x="0" y="0" width="3" height="320" fill="#f97316" opacity="0.7"/>

  <!-- === LOGO ICON (scaled up, left side) === -->
  <g transform="translate(64, 96) scale(2)">
    <!-- Left hand -->
    <rect x="3" y="36" width="13" height="8" rx="3" fill="#f97316"/>
    <rect x="4" y="29" width="3.5" height="9" rx="1.75" fill="#f97316"/>
    <rect x="8.5" y="27" width="3.5" height="11" rx="1.75" fill="#f97316"/>
    <rect x="13" y="29" width="3" height="9" rx="1.5" fill="#f97316"/>
    <!-- Baton -->
    <rect x="14" y="30" width="36" height="7" rx="3.5" fill="#f97316"/>
    <rect x="18" y="30" width="2" height="7" rx="1" fill="#ea6c0a"/>
    <rect x="23" y="30" width="2" height="7" rx="1" fill="#ea6c0a"/>
    <rect x="28" y="30" width="2" height="7" rx="1" fill="#ea6c0a"/>
    <circle cx="14" cy="33.5" r="4.5" fill="#fb923c"/>
    <circle cx="50" cy="33.5" r="4.5" fill="#fb923c"/>
    <!-- Document -->
    <rect x="29" y="22" width="18" height="14" rx="2" fill="#f5f0e8"/>
    <line x1="32" y1="26" x2="44" y2="26" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="32" y1="29" x2="44" y2="29" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="32" y1="32" x2="40" y2="32" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
    <path d="M44 22 L47 22 L47 25 Z" fill="#e0d8cc"/>
    <path d="M44 22 L44 25 L47 25" fill="none" stroke="#c8bfb0" stroke-width="0.8"/>
    <rect x="36" y="20" width="4" height="4" rx="1" fill="#f97316"/>
    <!-- Right hand -->
    <rect x="48" y="36" width="13" height="8" rx="3" fill="#f97316"/>
    <rect x="49" y="29" width="3" height="9" rx="1.5" fill="#f97316"/>
    <rect x="53" y="27" width="3.5" height="11" rx="1.75" fill="#f97316"/>
    <rect x="57.5" y="29" width="3.5" height="9" rx="1.75" fill="#f97316"/>
    <!-- Motion lines -->
    <line x1="6" y1="21" x2="13" y2="21" stroke="#f97316" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
    <line x1="4" y1="24" x2="9" y2="24" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Thin vertical separator -->
  <line x1="310" y1="60" x2="310" y2="260" stroke="#ffffff" stroke-width="0.5" opacity="0.12"/>

  <!-- === TEXT AREA === -->
  <!-- Main title -->
  <text x="358" y="162" 
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="52" font-weight="700" letter-spacing="-1"
        fill="#ffffff">claude-session-handoff</text>

  <!-- Tagline with orange accents for dots -->
  <!-- "capture" -->
  <text x="358" y="208"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="17" font-weight="400" letter-spacing="2"
        fill="#f97316">capture</text>
  <!-- separator dot -->
  <text x="462" y="208"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="17" fill="#f97316" opacity="0.5"> ·</text>
  <!-- "hand off" -->
  <text x="487" y="208"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="17" font-weight="400" letter-spacing="2"
        fill="#f97316">hand off</text>
  <!-- separator dot -->
  <text x="594" y="208"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="17" fill="#f97316" opacity="0.5"> ·</text>
  <!-- "pick up where you left off" -->
  <text x="619" y="208"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="17" font-weight="400" letter-spacing="2"
        fill="#f97316">pick up where you left off</text>

  <!-- Thin underline accent under title -->
  <rect x="358" y="172" width="860" height="1.5" fill="#f97316" opacity="0.2" rx="1"/>

  <!-- Corner accent dots -->
  <circle cx="1248" cy="40" r="2" fill="#f97316" opacity="0.4"/>
  <circle cx="1260" cy="40" r="2" fill="#f97316" opacity="0.2"/>
  <circle cx="1248" cy="280" r="2" fill="#f97316" opacity="0.4"/>
  <circle cx="1260" cy="280" r="2" fill="#f97316" opacity="0.2"/>
</svg>
