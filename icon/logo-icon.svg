<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" fill="#0a0a0a" rx="10"/>

  <!-- Left hand (passing) -->
  <g fill="#f97316" stroke="#f97316" stroke-linecap="round" stroke-linejoin="round">
    <!-- Palm left -->
    <rect x="3" y="36" width="13" height="8" rx="3" fill="#f97316" stroke="none"/>
    <!-- Fingers left hand -->
    <rect x="4" y="29" width="3.5" height="9" rx="1.75" fill="#f97316" stroke="none"/>
    <rect x="8.5" y="27" width="3.5" height="11" rx="1.75" fill="#f97316" stroke="none"/>
    <rect x="13" y="29" width="3" height="9" rx="1.5" fill="#f97316" stroke="none"/>
  </g>

  <!-- Baton body -->
  <rect x="14" y="30" width="36" height="7" rx="3.5" fill="#f97316" stroke="none"/>
  <!-- Baton grip texture -->
  <rect x="18" y="30" width="2" height="7" rx="1" fill="#ea6c0a" stroke="none"/>
  <rect x="23" y="30" width="2" height="7" rx="1" fill="#ea6c0a" stroke="none"/>
  <rect x="28" y="30" width="2" height="7" rx="1" fill="#ea6c0a" stroke="none"/>
  <!-- Baton end caps -->
  <circle cx="14" cy="33.5" r="4.5" fill="#fb923c" stroke="none"/>
  <circle cx="50" cy="33.5" r="4.5" fill="#fb923c" stroke="none"/>

  <!-- Document/sticky note wrapped around baton center -->
  <rect x="29" y="22" width="18" height="14" rx="2" fill="#f5f0e8" stroke="none"/>
  <!-- Document lines -->
  <line x1="32" y1="26" x2="44" y2="26" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="29" x2="44" y2="29" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="32" y1="32" x2="40" y2="32" stroke="#c8bfb0" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Document fold corner -->
  <path d="M44 22 L47 22 L47 25 Z" fill="#e0d8cc" stroke="none"/>
  <path d="M44 22 L44 25 L47 25" fill="none" stroke="#c8bfb0" stroke-width="0.8"/>
  <!-- Orange accent pin / clip -->
  <rect x="36" y="20" width="4" height="4" rx="1" fill="#f97316" stroke="none"/>

  <!-- Right hand (receiving) -->
  <g fill="#f97316">
    <!-- Palm right -->
    <rect x="48" y="36" width="13" height="8" rx="3" fill="#f97316" stroke="none"/>
    <!-- Fingers right hand -->
    <rect x="49" y="29" width="3" height="9" rx="1.5" fill="#f97316" stroke="none"/>
    <rect x="53" y="27" width="3.5" height="11" rx="1.75" fill="#f97316" stroke="none"/>
    <rect x="57.5" y="29" width="3.5" height="9" rx="1.75" fill="#f97316" stroke="none"/>
  </g>

  <!-- Motion lines left of baton -->
  <line x1="6" y1="21" x2="13" y2="21" stroke="#f97316" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  <line x1="4" y1="24" x2="9" y2="24" stroke="#f97316" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
